<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a24;
      --border:    #2e2e42;
      --x-color:   #e05c7a;
      --o-color:   #5cc8e0;
      --text:      #e8e8f0;
      --muted:     #6b6b88;
      --win-glow:  #f0c040;
      --radius:    16px;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    /* ── Title ── */
    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--x-color), var(--o-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Score Bar ── */
    .scores {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
    }
    .score-box {
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 24px;
      min-width: 80px;
    }
    .score-box .label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .score-box .value {
      font-size: 1.6rem;
      font-weight: 700;
    }
    .score-box.x-box .value { color: var(--x-color); }
    .score-box.o-box .value { color: var(--o-color); }
    .score-box.draw-box .value { color: var(--muted); }

    /* ── Status ── */
    #status {
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 20px;
      min-height: 1.4em;
      transition: color 0.3s;
    }
    #status.x-turn  { color: var(--x-color); }
    #status.o-turn  { color: var(--o-color); }
    #status.winner  { color: var(--win-glow); font-weight: 700; font-size: 1rem; }
    #status.draw    { color: var(--muted); }

    /* ── Board ── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
      margin-bottom: 28px;
    }

    .cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 900;
      transition: background 0.15s, transform 0.1s, border-color 0.2s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .cell:hover:not(.taken) {
      background: #242434;
      border-color: #4a4a66;
      transform: scale(1.04);
    }
    .cell.taken { cursor: default; }
    .cell.x-mark { color: var(--x-color); }
    .cell.o-mark { color: var(--o-color); }

    /* pop-in animation */
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1);   opacity: 1; }
    }
    .cell.pop { animation: pop 0.22s ease forwards; }

    /* winning cell highlight */
    .cell.win {
      border-color: var(--win-glow);
      box-shadow: 0 0 16px 2px color-mix(in srgb, var(--win-glow) 40%, transparent);
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 12px; }

    button {
      padding: 10px 28px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    button:hover {
      background: #242434;
      border-color: #5c5c80;
      transform: translateY(-1px);
    }
    button:active { transform: translateY(0); }

    #restart-btn { border-color: var(--x-color); color: var(--x-color); }
    #restart-btn:hover { background: color-mix(in srgb, var(--x-color) 12%, transparent); }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      #board {
        grid-template-columns: repeat(3, 86px);
        grid-template-rows: repeat(3, 86px);
        gap: 8px;
      }
      .cell { font-size: 2rem; border-radius: 12px; }
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div class="scores">
    <div class="score-box x-box">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw-box">
      <div class="label">Draws</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o-box">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status" class="x-turn">X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div class="btn-row">
    <button id="restart-btn">New Game</button>
    <button id="reset-score-btn">Reset Scores</button>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board        = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver     = false;
    let scores       = { X: 0, O: 0, draw: 0 };

    // ── DOM refs ───────────────────────────────────────────
    const cells         = document.querySelectorAll('.cell');
    const statusEl      = document.getElementById('status');
    const scoreX        = document.getElementById('score-x');
    const scoreO        = document.getElementById('score-o');
    const scoreDraw     = document.getElementById('score-draw');
    const restartBtn    = document.getElementById('restart-btn');
    const resetScoreBtn = document.getElementById('reset-score-btn');

    // ── Helpers ────────────────────────────────────────────
    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className   = cls;
    }

    function checkWinner() {
      for (const combo of WINS) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], combo };
        }
      }
      return board.includes(null) ? null : { winner: 'draw', combo: [] };
    }

    function renderScores() {
      scoreX.textContent    = scores.X;
      scoreO.textContent    = scores.O;
      scoreDraw.textContent = scores.draw;
    }

    // ── Click handler ──────────────────────────────────────
    function handleClick(e) {
      const cell  = e.currentTarget;
      const index = parseInt(cell.dataset.index);

      if (gameOver || board[index]) return;

      board[index] = currentPlayer;
      cell.textContent = currentPlayer;
      cell.classList.add('taken', currentPlayer === 'X' ? 'x-mark' : 'o-mark', 'pop');

      const result = checkWinner();

      if (result) {
        gameOver = true;
        if (result.winner === 'draw') {
          scores.draw++;
          setStatus("It's a draw!", 'draw');
        } else {
          scores[result.winner]++;
          result.combo.forEach(i => cells[i].classList.add('win'));
          setStatus(`${result.winner} wins! 🎉`, 'winner');
        }
        renderScores();
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      setStatus(`${currentPlayer}'s turn`, currentPlayer === 'X' ? 'x-turn' : 'o-turn');
    }

    // ── New game ───────────────────────────────────────────
    function newGame() {
      board         = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver      = false;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className   = 'cell';
      });
      setStatus("X's turn", 'x-turn');
    }

    // ── Event listeners ────────────────────────────────────
    cells.forEach(cell => cell.addEventListener('click', handleClick));
    restartBtn.addEventListener('click', newGame);
    resetScoreBtn.addEventListener('click', () => {
      scores = { X: 0, O: 0, draw: 0 };
      renderScores();
      newGame();
    });

    // ── Init ───────────────────────────────────────────────
    renderScores();
  </script>

</body>
</html>
